<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / Theme -->
    <meta name="theme-color" content="#06100c" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Apple PWA — sin estas tags "Añadir a inicio" puede no aparecer en Safari -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FinLibre" />

    <!-- Apple touch icon (180×180 recomendado; usamos 192 que Apple escala bien) -->
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icon-512.png" />

    <!-- Splash screen de inicio en iPhone -->
    <link rel="apple-touch-startup-image" href="/icon-512.png" />

    <!-- Favicon estándar -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />

    <!-- SEO / descripción -->
    <meta name="description" content="Tu libertad financiera en la palma de la mano" />
    <meta name="application-name" content="FinLibre" />

    <title>FinLibre</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
